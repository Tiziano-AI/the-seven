services:
  postgres:
    image: postgres:17-alpine
    container_name: the-seven-postgres
    environment:
      POSTGRES_DB: the_seven
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d the_seven"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    volumes:
      - the_seven_postgres:/var/lib/postgresql/data

volumes:
  the_seven_postgres:
